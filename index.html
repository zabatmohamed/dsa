<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Structures & Algorithms — Study Platform</title>
    <style>
        :root {
            --bg: #f8f7f4;
            --card-bg: #ffffff;
            --text: #1c1c1c;
            --text-secondary: #5a5a5a;
            --text-muted: #7a7a7a;
            --accent: #1a365d;
            --accent-warm: #8b4343;
            --accent-light: #e8edf3;
            --border: #e5e2dc;
            --border-light: #efede8;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.07), 0 2px 6px rgba(0, 0, 0, 0.04);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-serif: Georgia, 'Times New Roman', 'Crimson Text', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top Bar ───────────────────── */
        .top-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-light);
            padding: 0 1.5rem;
            height: 48px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.92);
        }
        .top-bar__title {
            font-family: var(--font-serif);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.02em;
        }
        .top-bar__dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-warm);
            margin-right: 8px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }

        /* ── Main ──────────────────────── */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 1.25rem 4rem;
        }

        /* ── Hero ──────────────────────── */
        .hero {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 380px;
            padding: 2rem 1rem;
            margin: 0 -1.25rem 2.5rem;
            overflow: hidden;
            background: linear-gradient(180deg,
            rgba(248, 247, 244, 0.3) 0%,
            rgba(240, 238, 233, 0.6) 40%,
            rgba(248, 247, 244, 0.9) 100%);
            border-bottom: 1px solid var(--border-light);
        }
        .hero__canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .hero__content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 640px;
            padding: 0 1rem;
        }
        .hero__title {
            font-family: var(--font-serif);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
            line-height: 1.2;
            margin-bottom: 0.6rem;
        }
        .hero__title .accent {
            color: var(--accent);
        }
        .hero__subtitle {
            font-size: clamp(0.95rem, 1.6vw, 1.15rem);
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.01em;
            line-height: 1.5;
        }
        .hero__line {
            display: block;
            width: 40px;
            height: 2px;
            background: var(--accent-warm);
            margin: 1rem auto 0;
            border-radius: 1px;
            opacity: 0.7;
        }

        /* ── Search ────────────────────── */
        .search-section {
            margin-bottom: 2rem;
            position: relative;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        .search-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .search-input {
            width: 100%;
            padding: 13px 16px 13px 46px;
            font-size: 0.95rem;
            font-family: var(--font-sans);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--card-bg);
            color: var(--text);
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            outline: none;
        }
        .search-input::placeholder {
            color: #b0aca5;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.07), var(--shadow-md);
        }
        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            color: var(--text-muted);
            display: none;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .search-clear.visible {
            display: flex;
        }
        .search-clear:hover {
            color: var(--text);
            background: var(--border-light);
        }
        .search-clear svg {
            width: 16px;
            height: 16px;
        }
        .search-results-count {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            min-height: 1.2em;
            transition: opacity var(--transition);
        }

        /* ── Cards Grid ────────────────── */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            padding: 0;
        }
        @media (min-width: 640px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.15rem;
            }
        }
        @media (min-width: 960px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.25rem;
            }
        }

        /* ── Card ──────────────────────── */
        .card-container {
            transition: opacity 0.35s ease, transform 0.35s ease, max-height 0.4s ease;
            opacity: 1;
            transform: scale(1);
        }
        .card-container.hidden {
            opacity: 0;
            transform: scale(0.94);
            pointer-events: none;
            max-height: 0;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            overflow: hidden;
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
            border-color: #dcd8d0;
        }
        .card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.2rem;
            cursor: pointer;
            user-select: none;
            gap: 0.75rem;
            transition: background var(--transition);
        }
        .card__header:hover {
            background: #fcfbf9;
        }
        .card__info {
            flex: 1;
            min-width: 0;
        }
        .card__title {
            font-family: var(--font-serif);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.005em;
            line-height: 1.3;
            margin-bottom: 3px;
        }
        .card__type {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-light);
            padding: 3px 10px;
            border-radius: 100px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .card__arrow {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            color: var(--text-muted);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .card__arrow svg {
            width: 18px;
            height: 18px;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .card.expanded .card__arrow svg {
            transform: rotate(90deg);
        }
        .card.expanded .card__arrow {
            color: var(--accent);
            background: var(--accent-light);
        }
        .card__body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.expanded .card__body {
            max-height: 600px;
        }
        .card__body-inner {
            padding: 0 1.2rem 1.2rem;
            border-top: 1px solid var(--border-light);
            margin-top: 0;
            padding-top: 1rem;
        }

        /* ── Resource Buttons ──────────── */
        .card__resources {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .btn-resource {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: var(--font-sans);
            border-radius: var(--radius-sm);
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition);
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            letter-spacing: 0.01em;
        }
        .btn-resource:hover {
            border-color: var(--accent);
            background: #f9fafb;
            box-shadow: var(--shadow-sm);
        }
        .btn-resource--pdf {
            border-color: #e8d5d5;
            color: #7a3b3b;
        }
        .btn-resource--pdf:hover {
            border-color: #c9a0a0;
            background: #fdf8f8;
            color: #5c2020;
        }
        .btn-resource--youtube {
            border-color: #d5d8e8;
            color: #3b4a7a;
        }
        .btn-resource--youtube:hover {
            border-color: #a0a8c9;
            background: #f8f9fd;
            color: #20285c;
        }
        .btn-resource svg {
            width: 15px;
            height: 15px;
        }

        /* ── Problems ──────────────────── */
        .card__problems-title {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
        }
        .problems-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }
        .problem-pill {
            display: inline-block;
            padding: 6px 12px;
            font-size: 0.78rem;
            font-family: var(--font-sans);
            font-weight: 450;
            color: var(--text);
            background: #fafaf8;
            border: 1px solid var(--border);
            border-radius: 100px;
            text-decoration: none;
            transition: all var(--transition);
            cursor: pointer;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }
        .problem-pill:hover {
            border-color: #c5bfb4;
            background: #f5f3ef;
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }
        .problem-pill__number {
            color: var(--text-muted);
            font-size: 0.7rem;
            margin-right: 2px;
        }
        .problem-pill__dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent-warm);
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
            opacity: 0.6;
        }

        /* ── Problems Placeholder ──────── */
        .problems-placeholder {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 0.82rem;
            color: #b0aca5;
            letter-spacing: 0.02em;
            padding: 0.3rem 0;
            user-select: none;
        }

        /* ── Empty State ───────────────── */
        .empty-state {
            display: none;
            text-align: center;
            padding: 3rem 1rem;
            grid-column: 1 / -1;
        }
        .empty-state.visible {
            display: block;
        }
        .empty-state__text {
            font-family: var(--font-serif);
            font-size: 1.1rem;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }

        /* ── Footer ────────────────────── */
        .footer {
            text-align: center;
            padding: 2rem 1rem 2.5rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            border-top: 1px solid var(--border-light);
            margin-top: 1rem;
        }
        .footer span {
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--text-secondary);
        }

        /* ── Responsive Fine-tuning ────── */
        @media (max-width: 480px) {
            .hero {
                min-height: 300px;
                padding: 1.5rem 0.75rem;
                margin: 0 -0.75rem 1.5rem;
            }
            .main-content {
                padding: 0 0.75rem 3rem;
            }
            .card__header {
                padding: 0.9rem 1rem;
            }
            .card__body-inner {
                padding: 0 1rem 1rem;
                padding-top: 0.85rem;
            }
            .card__title {
                font-size: 0.95rem;
            }
            .btn-resource {
                padding: 7px 11px;
                font-size: 0.76rem;
            }
            .problem-pill {
                padding: 5px 10px;
                font-size: 0.73rem;
            }
            .search-input {
                padding: 11px 14px 11px 40px;
                font-size: 0.9rem;
            }
            .search-icon {
                left: 12px;
            }
            .search-icon svg {
                width: 16px;
                height: 16px;
            }
        }
        @media (min-width: 1200px) {
            .cards-grid {
                gap: 1.4rem;
            }
            .hero {
                min-height: 440px;
            }
        }
    </style>
</head>
<body>

<!-- ── Top Bar ───────────────────── -->
<header class="top-bar">
    <span class="top-bar__dot"></span>
    <span class="top-bar__title">DSA Study Platform</span>
</header>

<!-- ── Main Content ──────────────── -->
<main class="main-content">

    <!-- Hero -->
    <section class="hero" aria-label="Hero">
        <canvas class="hero__canvas" id="heroCanvas" aria-hidden="true"></canvas>
        <div class="hero__content">
            <h1 class="hero__title">
                Data Structures <span class="accent">&</span> Algorithms
            </h1>
            <p class="hero__subtitle">
                A curated personal reference for algorithmic thinking,
                with essential resources and practice problems.
            </p>
            <span class="hero__line"></span>
        </div>
    </section>

    <!-- Search -->
    <section class="search-section" aria-label="Search">
        <div class="search-wrapper">
                <span class="search-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </span>
            <input
                    type="text"
                    class="search-input"
                    id="searchInput"
                    placeholder="Filter by algorithm name or category..."
                    autocomplete="off"
            >
            <button class="search-clear" id="searchClear" aria-label="Clear search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <p class="search-results-count" id="resultsCount"></p>
    </section>

    <!-- Cards Grid -->
    <div class="cards-grid" id="cardsGrid">
        <!-- Cards are injected by JavaScript -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
        <p class="empty-state__text">No algorithms match your search.</p>
    </div>
</main>

<!-- ── Footer ────────────────────── -->
<footer class="footer">
    <span>Data Structures & Algorithms</span> — Personal Study Platform
</footer>

<script>
    (function() {
        // ╔══════════════════════════════════════════════════════════╗
        // ║  ALGORITHMS DATA — Easily expandable array of objects   ║
        // ║                                                          ║
        // ║  To add a new algorithm card:                            ║
        // ║    1. Copy one object block below                        ║
        // ║    2. Change the id, title, type, pdfUrl, youtubeUrl    ║
        // ║    3. Add LeetCode problems to the problems array        ║
        // ║                                                          ║
        // ║  Each problem object needs:                              ║
        // ║    - name:  Display name for the problem                 ║
        // ║    - number: LeetCode problem number                     ║
        // ║    - url:   Full LeetCode problem URL                    ║
        // ║                                                          ║
        // ║  PDF files should be placed in the "files/" directory.   ║
        // ║  YouTube links can be search queries or direct videos.   ║
        // ╚══════════════════════════════════════════════════════════╝

        const algorithmsData = [
            // ── Insertion Sort ──────────────────────────────
            {
                id: 'insertion-sort', // Unique identifier for this card
                title: 'Insertion Sort', // Display title on the card
                type: 'Sorting', // Category badge text
                pdfUrl: 'files/insertion_sort.pdf', // Path to PDF resource
                youtubeUrl: 'https://youtu.be/Kg4bqzAqRBM?si=Mvktg03MVxXSVNnR', // YouTube search link (placeholder — replace with a direct video URL when ready)
                problems: [
                    // ──────────────────────────────────────────
                    // Add LeetCode problems here as you solve them.
                    // Each problem should follow this format:
                    //
                    // {
                    //     name: 'Problem Display Name',
                    //     number: 000,
                    //     url: 'https://leetcode.com/problems/problem-slug/'
                    // },
                    //
                    // Example (uncomment and edit):
                    // { name: 'Sort an Array', number: 912, url: 'https://leetcode.com/problems/sort-an-array/' },
                    { name: 'Insertion Sort List', number: 2418, url: 'https://leetcode.com/problems/sort-the-people/' },
                    // ──────────────────────────────────────────
                ]
            },

            // ╔══════════════════════════════════════════════════════╗
            // ║  ADD MORE ALGORITHM CARDS BELOW                      ║
            // ║                                                      ║
            // ║  Copy the block above (from { to },) and paste here. ║
            // ║  Change the values for the new algorithm.            ║
            // ║                                                      ║
            // ║  Example:                                            ║
            // ║  {                                                   ║
            // ║      id: 'merge-sort',                               ║
            // ║      title: 'Merge Sort',                            ║
            // ║      type: 'Sorting',                                ║
            // ║      pdfUrl: 'files/merge_sort.pdf',                 ║
            // ║      youtubeUrl: 'https://...',                      ║
            // ║      problems: [ ... ]                               ║
            // ║  },                                                  ║
            // ╚══════════════════════════════════════════════════════╝
        ];

        // ─────────────────────────────────────
        // DOM REFERENCES
        // ─────────────────────────────────────
        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const resultsCount = document.getElementById('resultsCount');
        const emptyState = document.getElementById('emptyState');

        // ─────────────────────────────────────
        // BUILD CARDS FROM DATA
        // ─────────────────────────────────────
        function buildCardHTML(algo) {
            // Build problems HTML if any exist, otherwise show a placeholder
            let problemsHTML;
            if (algo.problems && algo.problems.length > 0) {
                problemsHTML = algo.problems.map(p => `
                        <a href="${p.url}" target="_blank" rel="noopener noreferrer" class="problem-pill" title="LeetCode ${p.number}: ${p.name}">
                            <span class="problem-pill__dot"></span>${p.name}
                            <span class="problem-pill__number">#${p.number}</span>
                        </a>
                    `).join('');
            } else {
                // Placeholder for future problems — subtle and professional
                problemsHTML = '<span class="problems-placeholder">Problems will be added as I solve them.</span>';
            }

            return `
                    <div class="card-container" data-search="${algo.title.toLowerCase()} ${algo.type.toLowerCase()}" data-id="${algo.id}">
                        <article class="card" data-id="${algo.id}">
                            <div class="card__header" data-action="toggle">
                                <div class="card__info">
                                    <h2 class="card__title">${algo.title}</h2>
                                    <span class="card__type">${algo.type}</span>
                                </div>
                                <button class="card__arrow" data-action="toggle" aria-label="Expand card">
                                    <svg viewBox="0 0 24 24">
                                        <polyline points="9 18 15 12 9 6"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="card__body">
                                <div class="card__body-inner">
                                    <div class="card__resources">
                                        <a href="${algo.pdfUrl}" class="btn-resource btn-resource--pdf" target="_blank" rel="noopener noreferrer" title="View PDF resource">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                                <polyline points="14 2 14 8 20 8"/>
                                                <line x1="16" y1="13" x2="8" y2="13"/>
                                                <line x1="16" y1="17" x2="8" y2="17"/>
                                                <polyline points="10 9 9 9 8 9"/>
                                            </svg>
                                            PDF Notes
                                        </a>
                                        <a href="${algo.youtubeUrl}" class="btn-resource btn-resource--youtube" target="_blank" rel="noopener noreferrer" title="Watch video explanation">
                                            <svg viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
                                            </svg>
                                            YouTube
                                        </a>
                                    </div>
                                    <p class="card__problems-title">Practice Problems</p>
                                    <div class="problems-list">
                                        ${problemsHTML}
                                    </div>
                                </div>
                            </div>
                        </article>
                    </div>
                `;
        }

        function renderAllCards() {
            cardsGrid.innerHTML = algorithmsData.map(buildCardHTML).join('');
            // Re-attach event listeners after rendering
            attachCardListeners();
        }

        // ─────────────────────────────────────
        // CARD EXPAND / COLLAPSE BEHAVIOR
        // ─────────────────────────────────────
        function attachCardListeners() {
            const cards = cardsGrid.querySelectorAll('.card');
            cards.forEach(card => {
                const header = card.querySelector('.card__header');
                const body = card.querySelector('.card__body');

                // Clone to remove any old listeners safely
                const newHeader = header.cloneNode(true);
                header.parentNode.replaceChild(newHeader, header);

                newHeader.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isExpanded = card.classList.contains('expanded');

                    if (isExpanded) {
                        // Collapse the card
                        card.classList.remove('expanded');
                        body.style.maxHeight = '0';
                    } else {
                        // Expand the card with smooth animation
                        card.classList.add('expanded');
                        // Temporarily remove max-height to measure natural height
                        body.style.maxHeight = 'none';
                        const fullHeight = body.scrollHeight;
                        body.style.maxHeight = '0';
                        // Force a reflow so the browser registers the 0 height
                        body.offsetHeight;
                        // Animate to the full height
                        body.style.maxHeight = fullHeight + 'px';

                        // After the transition ends, remove the fixed max-height
                        // so the card can grow if content changes in the future
                        const onTransitionEnd = function() {
                            body.style.maxHeight = 'none';
                            body.removeEventListener('transitionend', onTransitionEnd);
                        };
                        body.addEventListener('transitionend', onTransitionEnd);
                    }
                });
            });
        }

        // ─────────────────────────────────────
        // SEARCH / FILTER FUNCTIONALITY
        // ─────────────────────────────────────
        function updateSearch() {
            const query = searchInput.value.trim().toLowerCase();
            const containers = cardsGrid.querySelectorAll('.card-container');
            let visibleCount = 0;

            containers.forEach(container => {
                const searchData = container.getAttribute('data-search');
                if (!query || searchData.includes(query)) {
                    container.classList.remove('hidden');
                    visibleCount++;
                } else {
                    container.classList.add('hidden');
                }
            });

            // Update the results count text
            const totalCards = containers.length;
            if (query && visibleCount < totalCards) {
                resultsCount.textContent = `Showing ${visibleCount} of ${totalCards} algorithm${totalCards > 1 ? 's' : ''}`;
            } else if (query && visibleCount === 0) {
                resultsCount.textContent = '';
            } else {
                resultsCount.textContent = '';
            }

            // Show or hide the empty state message
            if (visibleCount === 0 && query) {
                emptyState.classList.add('visible');
            } else {
                emptyState.classList.remove('visible');
            }

            // Show or hide the clear button in the search input
            if (query) {
                searchClear.classList.add('visible');
            } else {
                searchClear.classList.remove('visible');
            }
        }

        searchInput.addEventListener('input', updateSearch);
        searchClear.addEventListener('click', function() {
            searchInput.value = '';
            updateSearch();
            searchInput.focus();
        });

        // Keyboard shortcut: press Escape to clear the search
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                searchInput.value = '';
                updateSearch();
                searchInput.blur();
            }
        });

        // ─────────────────────────────────────
        // HERO CANVAS ANIMATION
        // (Abstract algorithm / graph visual)
        // ─────────────────────────────────────
        function initHeroCanvas() {
            const canvas = document.getElementById('heroCanvas');
            const ctx = canvas.getContext('2d');
            let animationId;
            let nodes = [];
            let particles = [];
            const nodeCount = 10;
            const particleCount = 6;

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                return { w: rect.width, h: rect.height };
            }

            function createNodes(w, h) {
                nodes = [];
                const paddingX = w * 0.1;
                const paddingY = h * 0.15;
                const usableW = w - paddingX * 2;
                const usableH = h - paddingY * 2;

                const presetPositions = [
                    { fx: 0.15, fy: 0.25, r: 8 },
                    { fx: 0.35, fy: 0.15, r: 5 },
                    { fx: 0.55, fy: 0.22, r: 7 },
                    { fx: 0.75, fy: 0.18, r: 6 },
                    { fx: 0.85, fy: 0.3, r: 9 },
                    { fx: 0.7, fy: 0.45, r: 5 },
                    { fx: 0.5, fy: 0.5, r: 8 },
                    { fx: 0.25, fy: 0.55, r: 6 },
                    { fx: 0.4, fy: 0.35, r: 7 },
                    { fx: 0.6, fy: 0.4, r: 5 },
                ];

                nodes = presetPositions.slice(0, nodeCount).map((p, i) => ({
                    x: paddingX + p.fx * usableW,
                    y: paddingY + p.fy * usableH,
                    baseX: paddingX + p.fx * usableW,
                    baseY: paddingY + p.fy * usableH,
                    radius: p.r,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.0008 + Math.random() * 0.0012,
                    amplitude: 6 + Math.random() * 10,
                    color: i % 3 === 0 ?
                        'rgba(139,67,67,0.35)' :
                        i % 3 === 1 ?
                            'rgba(26,54,93,0.3)' :
                            'rgba(80,100,130,0.25)',
                    glowColor: i % 3 === 0 ?
                        'rgba(139,67,67,0.12)' :
                        i % 3 === 1 ?
                            'rgba(26,54,93,0.1)' :
                            'rgba(80,100,130,0.08)',
                }));
            }

            function createParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    const edge = getRandomEdge();
                    if (edge) {
                        particles.push({
                            from: edge.from,
                            to: edge.to,
                            t: Math.random(),
                            speed: 0.003 + Math.random() * 0.006,
                            size: 1.8 + Math.random() * 2.2,
                            opacity: 0.35 + Math.random() * 0.45,
                        });
                    }
                }
            }

            function getRandomEdge() {
                if (nodes.length < 2) return null;
                const idx1 = Math.floor(Math.random() * nodes.length);
                let idx2 = Math.floor(Math.random() * nodes.length);
                let attempts = 0;
                while (idx2 === idx1 && attempts < 20) {
                    idx2 = Math.floor(Math.random() * nodes.length);
                    attempts++;
                }
                if (idx2 === idx1) idx2 = (idx1 + 1) % nodes.length;
                return { from: idx1, to: idx2 };
            }

            function drawEdge(x1, y1, x2, y2, alpha) {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `rgba(160,170,185,${alpha})`;
                ctx.lineWidth = 0.7;
                ctx.stroke();
            }

            function drawNode(x, y, radius, color, glowColor) {
                const glow = ctx.createRadialGradient(x, y, radius * 0.3, x, y, radius * 2.5);
                glow.addColorStop(0, glowColor);
                glow.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath();
                ctx.arc(x, y, radius * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();

                const gradient = ctx.createRadialGradient(x - radius * 0.25, y - radius * 0.25, radius * 0.1, x, y,
                    radius);
                gradient.addColorStop(0, 'rgba(255,255,255,0.7)');
                gradient.addColorStop(0.5, color);
                gradient.addColorStop(1, 'rgba(255,255,255,0.15)');
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(x, y, radius + 1.5, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(180,185,195,0.3)`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            function drawParticle(particle) {
                const fromNode = nodes[particle.from];
                const toNode = nodes[particle.to];
                if (!fromNode || !toNode) return;
                const x = fromNode.x + (toNode.x - fromNode.x) * particle.t;
                const y = fromNode.y + (toNode.y - fromNode.y) * particle.t;
                ctx.beginPath();
                ctx.arc(x, y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100,120,150,${particle.opacity})`;
                ctx.fill();
                const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, particle.size * 3);
                glowGrad.addColorStop(0, `rgba(140,160,190,${particle.opacity * 0.5})`);
                glowGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath();
                ctx.arc(x, y, particle.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = glowGrad;
                ctx.fill();
            }

            function animate(timestamp) {
                const { w, h } = resizeCanvas();
                ctx.clearRect(0, 0, w, h);

                nodes.forEach(node => {
                    node.x = node.baseX + Math.sin(timestamp * node.speed + node.phase) * node.amplitude;
                    node.y = node.baseY + Math.cos(timestamp * node.speed * 0.7 + node.phase) * node
                        .amplitude * 0.7;
                });

                const drawnEdges = new Set();
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                        const maxDist = Math.min(w, h) * 0.4;
                        if (dist < maxDist) {
                            const alpha = (1 - dist / maxDist) * 0.22;
                            const edgeKey = `${Math.min(i,j)}-${Math.max(i,j)}`;
                            if (!drawnEdges.has(edgeKey) && alpha > 0.04) {
                                drawEdge(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y, alpha);
                                drawnEdges.add(edgeKey);
                            }
                        }
                    }
                }

                particles.forEach(particle => {
                    particle.t += particle.speed;
                    if (particle.t > 1) {
                        particle.t = 0;
                        const newEdge = getRandomEdge();
                        if (newEdge) {
                            particle.from = newEdge.from;
                            particle.to = newEdge.to;
                        }
                    }
                    drawParticle(particle);
                });

                nodes.forEach(node => {
                    drawNode(node.x, node.y, node.radius, node.color, node.glowColor);
                });

                animationId = requestAnimationFrame(animate);
            }

            function init() {
                if (animationId) cancelAnimationFrame(animationId);
                const { w, h } = resizeCanvas();
                createNodes(w, h);
                createParticles();
                if (animationId) cancelAnimationFrame(animationId);
                animationId = requestAnimationFrame(animate);
            }

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const { w, h } = resizeCanvas();
                    const paddingX = w * 0.1;
                    const paddingY = h * 0.15;
                    const usableW = w - paddingX * 2;
                    const usableH = h - paddingY * 2;
                    const presetPositions = [
                        { fx: 0.15, fy: 0.25 }, { fx: 0.35, fy: 0.15 }, { fx: 0.55, fy: 0.22 },
                        { fx: 0.75, fy: 0.18 }, { fx: 0.85, fy: 0.3 }, { fx: 0.7, fy: 0.45 },
                        { fx: 0.5, fy: 0.5 }, { fx: 0.25, fy: 0.55 }, { fx: 0.4, fy: 0.35 },
                        { fx: 0.6, fy: 0.4 },
                    ];
                    nodes.forEach((node, i) => {
                        const preset = presetPositions[i] || presetPositions[presetPositions.length -
                        1];
                        node.baseX = paddingX + preset.fx * usableW;
                        node.baseY = paddingY + preset.fy * usableH;
                    });
                }, 200);
            });

            init();
        }

        // ─────────────────────────────────────
        // INITIALIZE EVERYTHING
        // ─────────────────────────────────────
        function init() {
            renderAllCards();
            initHeroCanvas();
            updateSearch();
        }

        // Run once the DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
